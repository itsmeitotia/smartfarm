<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFarm Splash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #39FF14 0%, #32e612 100%);
            font-family: 'Inter', sans-serif;
            color: black;
            overflow: hidden;
        }
        .logo-container {
            width: 120px;
            height: 120px;
            background: black;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }
        .logo-icon {
            font-size: 60px;
        }
        h1 {
            font-size: 42px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }
        p {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.8;
            margin-top: 8px;
        }
        .farm-elements {
            position: absolute;
            bottom: -50px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            opacity: 0.1;
            font-size: 100px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">🌱</div>
    </div>
    <h1>SmartFarm</h1>
    <p>Kenya's Digital Marketplace</p>
    
    <div class="farm-elements">
        <span>🚜</span>
        <span>🐄</span>
        <span>🌽</span>
        <span>🌾</span>
    </div>
</body>
</html>
